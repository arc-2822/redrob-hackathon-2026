ai_tools_used:
  - "ChatGPT" 
  - "Claude"

ai_usage_summary: |
  ChatGPT was used for brainstorming the overall ranking approach, debugging
  Python code, refining the scoring pipeline, improving reasoning generation,
  and reviewing the overall implementation. Claude was additionally used for
  code review, implementation suggestions, and discussing possible improvements
  to the ranking strategy. No external APIs or large language models were used
  during candidate ranking. The final ranking system runs completely offline
  using Python and scikit-learn.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  This project implements a hybrid candidate ranking system that combines
  semantic similarity with heuristic scoring. The job description and candidate
  career history are compared using TF-IDF vectorization and cosine similarity
  to estimate semantic relevance. Additional scoring components evaluate years
  of experience, current job title, technical skills, behavioural hiring
  signals, retrieval-specific expertise, and profile consistency. Human-readable
  reasoning is generated for every shortlisted candidate, providing recruiters
  with transparent explanations for each recommendation. The complete pipeline
  runs on CPU without requiring internet connectivity or external AI services.

